<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator - Minimalis & Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library untuk generate QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Abu-abu sangat muda */
        }

        .glass-panel {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: #3b82f6;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #dbeafe;
            color: #1e40af;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: #bfdbfe;
        }

        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 8px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navigasi -->
    <nav class="bg-white border-b border-gray-100 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M3 4a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1V4zm2 2V5h1v1H5zM3 13a1 1 0 011-1h3a1 1 0 011 1v3a1 1 0 01-1 1H4a1 1 0 01-1-1v-3zm2 2v-1h1v1H5zM13 3a1 1 0 00-1 1v3a1 1 0 001 1h3a1 1 0 001-1V4a1 1 0 00-1-1h-3zm1 2v1h1V5h-1z" clip-rule="evenodd" />
                    <path d="M11 11a1 1 0 011-1h1a1 1 0 011 1v1a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1zM16 11a1 1 0 011-1h1a1 1 0 011 1v1a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1zM11 16a1 1 0 011-1h1a1 1 0 011 1v1a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1zM14 14a1 1 0 00-1 1v1a1 1 0 001 1h1a1 1 0 001-1v-1a1 1 0 00-1-1h-1z" />
                </svg>
            </div>
            <span class="font-bold text-xl tracking-tight text-gray-800">QRGen</span>
        </div>
        <div class="flex gap-8">
            <a href="#" class="text-gray-600 hover:text-blue-600 transition-colors font-medium">Beranda</a>
            <a href="#" class="text-gray-600 hover:text-blue-600 transition-colors font-medium">Tentang</a>
        </div>
    </nav>

    <!-- Konten Utama -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <!-- Panel Input (Kiri) -->
            <div class="glass-panel p-8 rounded-2xl">
                <h1 class="text-2xl font-semibold text-gray-800 mb-2">Buat Kode QR</h1>
                <p class="text-gray-500 mb-8 text-sm">Masukkan tautan atau teks di bawah ini untuk menghasilkan kode QR secara instan.</p>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Konten</label>
                        <textarea 
                            id="qr-input" 
                            rows="4" 
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all resize-none text-gray-700"
                            placeholder="Ketik link (https://...) atau teks di sini..."
                        ></textarea>
                    </div>
                    
                    <button 
                        onclick="generateQR()"
                        class="btn-primary w-full py-4 rounded-xl text-white font-semibold shadow-lg shadow-blue-200"
                    >
                        Buat Kode QR
                    </button>
                </div>
            </div>

            <!-- Panel Hasil (Kanan) -->
            <div class="flex flex-col items-center justify-center h-full">
                <div id="result-panel" class="hidden w-full flex flex-col items-center animate-in fade-in duration-500">
                    <div class="glass-panel p-6 rounded-2xl mb-6 inline-block">
                        <div id="qrcode"></div>
                    </div>
                    
                    <button 
                        id="download-btn"
                        onclick="downloadQR()"
                        class="btn-secondary px-8 py-3 rounded-xl font-medium flex items-center gap-2"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                          <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                        Unduh Kode QR
                    </button>
                </div>

                <!-- Placeholder state -->
                <div id="placeholder" class="text-center p-12 border-2 border-dashed border-gray-200 rounded-3xl w-full">
                    <div class="text-gray-300 mb-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                        </svg>
                    </div>
                    <p class="text-gray-400 font-medium">Hasil akan muncul di sini</p>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-gray-400 text-sm">
        &copy; 2024 QRGen. Dibuat dengan cinta untuk para pengembang.
    </footer>

    <script>
        let qrcodeInstance = null;

        function generateQR() {
            const input = document.getElementById('qr-input').value;
            const resultPanel = document.getElementById('result-panel');
            const placeholder = document.getElementById('placeholder');
            const qrContainer = document.getElementById('qrcode');

            if (!input.trim()) {
                alert("Harap masukkan teks atau tautan terlebih dahulu.");
                return;
            }

            qrContainer.innerHTML = "";
            
            qrcodeInstance = new QRCode(qrContainer, {
                text: input,
                width: 200,
                height: 200,
                colorDark : "#1f2937",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            placeholder.classList.add('hidden');
            resultPanel.classList.remove('hidden');
        }

        function downloadQR() {
            const qrImg = document.querySelector('#qrcode img');
            if (qrImg) {
                const link = document.createElement('a');
                link.href = qrImg.src;
                link.download = 'qr-code-gen.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL("image/png");
                    link.download = 'qr-code-gen.png';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            }
        }
    </script>
</body>
</html>
