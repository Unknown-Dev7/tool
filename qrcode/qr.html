<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRWIR - Generator Minimalis</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: #f8fafc;
}

.glass {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(229,231,235,0.5);
}

.fade-in {
    animation: fadeIn .4s ease forwards;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<!-- NAVBAR -->
<nav class="bg-white/80 backdrop-blur border-b py-4 px-6 flex justify-between items-center">
    <h1 class="font-bold text-xl">QR<span class="text-blue-600">WIR</span></h1>
    <a href="https://www.facebook.com/Franzxz0" target="_blank"
        class="text-sm bg-blue-50 text-blue-600 px-4 py-2 rounded-lg hover:bg-blue-100">
        Facebook
    </a>
</nav>

<!-- MAIN -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-5xl grid md:grid-cols-2 gap-10">

<!-- INPUT -->
<div class="space-y-5">
    <h2 class="text-3xl font-bold">Buat QR Code</h2>

    <div class="glass p-6 rounded-3xl space-y-4">
        <textarea id="qr-input"
            placeholder="Masukkan link atau teks..."
            class="w-full p-4 rounded-xl border bg-gray-50 focus:ring-2 focus:ring-blue-200 outline-none"></textarea>

        <button onclick="generateQR()"
            class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 active:scale-95 transition">
            Generate QR
        </button>
    </div>
</div>

<!-- RESULT -->
<div class="flex flex-col items-center justify-center">

    <div id="placeholder" class="text-gray-400 border-2 border-dashed rounded-3xl p-16 text-center">
        QR muncul di sini
    </div>

    <div id="result" class="hidden flex flex-col items-center gap-4 fade-in">
        <div class="glass p-4 rounded-3xl shadow">
            <div id="qrcode"></div>
        </div>

        <button onclick="downloadQR()"
            class="bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl font-semibold hover:bg-emerald-600 hover:text-white transition">
            Download PNG
        </button>
    </div>

</div>

</div>
</main>

<!-- FOOTER -->
<footer class="text-center text-sm text-gray-400 py-6 border-t">
    © 2026 QRWIR - Franzxz0
</footer>

<script>
function generateQR() {
    const input = document.getElementById('qr-input').value.trim();
    const qrBox = document.getElementById('qrcode');
    const result = document.getElementById('result');
    const placeholder = document.getElementById('placeholder');

    if (!input) {
        alert("Isi dulu bro 😅");
        return;
    }

    qrBox.innerHTML = "";

    new QRCode(qrBox, {
        text: input,
        width: 220,
        height: 220
    });

    placeholder.classList.add("hidden");
    result.classList.remove("hidden");
}

function downloadQR() {
    const canvas = document.querySelector('#qrcode canvas');
    const link = document.createElement('a');

    if (!canvas) {
        alert("QR belum ada 😅");
        return;
    }

    link.href = canvas.toDataURL("image/png");
    link.download = "QRWIR.png";
    link.click();
}
</script>

</body>
</html>
