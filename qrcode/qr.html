<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRWIR-JAWIRR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Library QR -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .glass-panel {
            background: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: #3b82f6;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #dbeafe;
            color: #1e40af;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: #bfdbfe;
        }

        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 8px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-100 py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                <span class="text-white font-bold">QR</span>
            </div>
            <span class="font-bold text-xl tracking-tight text-gray-800">QRWIR</span>
        </div>

        <div class="flex gap-8 items-center">
            <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Beranda</a>
            <a href="#" class="text-gray-600 hover:text-blue-600 font-medium">Tentang</a>
            <a href="https://www.facebook.com/Franzxz0" target="_blank"
               class="text-blue-600 hover:text-blue-800 font-semibold">
               Facebook
            </a>
        </div>
    </nav>

    <!-- Main -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-start">

            <!-- Input -->
            <div class="glass-panel p-8 rounded-2xl">
                <h1 class="text-2xl font-semibold text-gray-800 mb-2">Buat Kode QR</h1>
                <p class="text-gray-500 mb-8 text-sm">Masukkan link atau teks di bawah ini.</p>

                <textarea 
                    id="qr-input" 
                    rows="4" 
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl mb-4"
                    placeholder="https://..."
                ></textarea>

                <button onclick="generateQR()"
                    class="btn-primary w-full py-4 rounded-xl text-white font-semibold">
                    Buat Kode QR
                </button>
            </div>

            <!-- Result -->
            <div class="flex flex-col items-center justify-center h-full">

                <div id="result-panel" class="hidden w-full flex flex-col items-center">
                    <div class="glass-panel p-6 rounded-2xl mb-6">
                        <div id="qrcode"></div>
                    </div>

                    <button onclick="downloadQR()"
                        class="btn-secondary px-8 py-3 rounded-xl font-medium">
                        Unduh Kode QR
                    </button>
                </div>

                <!-- Placeholder -->
                <div id="placeholder" class="text-center p-12 border-2 border-dashed border-gray-200 rounded-3xl w-full">
                    <p class="text-gray-400 font-medium">Hasil akan muncul di sini</p>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-gray-400 text-sm">
        &copy; 2026 QRWIR-JAWIRR | Dibuat oleh Franzxz0
    </footer>

    <script>
        let qrcodeInstance = null;

        function generateQR() {
            const input = document.getElementById('qr-input').value;
            const resultPanel = document.getElementById('result-panel');
            const placeholder = document.getElementById('placeholder');
            const qrContainer = document.getElementById('qrcode');

            if (!input.trim()) {
                alert("Isi dulu bro 😅");
                return;
            }

            qrContainer.innerHTML = "";

            qrcodeInstance = new QRCode(qrContainer, {
                text: input,
                width: 200,
                height: 200,
                colorDark : "#1f2937",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            placeholder.classList.add('hidden');
            resultPanel.classList.remove('hidden');
        }

        function downloadQR() {
            const qrImg = document.querySelector('#qrcode img');

            if (qrImg) {
                const link = document.createElement('a');
                link.href = qrImg.src;
                link.download = 'qr-code.png';
                link.click();
            } else {
                const canvas = document.querySelector('#qrcode canvas');
                if (canvas) {
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL("image/png");
                    link.download = 'qr-code.png';
                    link.click();
                }
            }
        }
    </script>

</body>
</html>
